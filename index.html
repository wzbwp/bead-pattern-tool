<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="纯前端拼豆图纸解析工具，上传图片后解析为拼豆色号和小色块图纸。"
    />
    <meta name="theme-color" content="#0f8f86" />
    <meta name="application-name" content="拼豆图纸解析工具" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="拼豆图纸" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>拼豆图纸解析工具</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
    <link rel="stylesheet" href="./assets/styles.css?v=mard-15" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Bead Pattern Tool</p>
          <h1>拼豆图纸解析工具</h1>
        </div>
        <div class="status-pill" id="statusPill">等待图片</div>
      </header>

      <main class="workspace">
        <aside class="control-panel" aria-label="解析设置">
          <section class="panel-section">
            <div class="section-title">图片</div>
            <label class="dropzone" id="dropzone">
              <input id="imageInput" type="file" accept="image/*" />
              <span class="drop-icon" aria-hidden="true">+</span>
              <span class="drop-title">选择或拖入图片</span>
              <span class="drop-meta" id="fileMeta">PNG / JPG / WebP</span>
            </label>
            <div class="source-preview" id="sourcePreview">
              <span>未选择图片</span>
            </div>
            <button class="button image-edit-button" id="editImageButton" type="button" disabled>
              编辑上传图片
            </button>
            <label class="field">
              <span>原图取景缩放</span>
              <input id="imageScale" type="range" min="50" max="300" value="100" />
            </label>
            <label class="field">
              <span>左右移动</span>
              <input id="imageOffsetX" type="range" min="-100" max="100" value="0" />
            </label>
            <label class="field">
              <span>上下移动</span>
              <input id="imageOffsetY" type="range" min="-100" max="100" value="0" />
            </label>
          </section>

          <section class="panel-section">
            <div class="section-title">图纸</div>
            <div class="config-group first-group">
              <div class="section-title compact">面板尺寸</div>
              <div class="panel-presets" id="panelPresets">
                <button class="panel-preset" type="button" data-size="52">52 x 52</button>
                <button class="panel-preset" type="button" data-size="78">78 x 78</button>
                <button class="panel-preset" type="button" data-size="104">104 x 104</button>
              </div>
              <div class="board-meta" id="boardMeta">当前：80 x 80 颗</div>
            </div>
            <label class="field">
              <span>宽度颗数</span>
              <input id="gridWidth" type="number" min="8" max="240" value="80" />
            </label>
            <label class="field">
              <span>高度颗数</span>
              <input id="gridHeight" type="number" min="8" max="240" value="80" />
            </label>
            <label class="check-row">
              <input id="lockRatio" type="checkbox" checked />
              <span>锁定原图比例</span>
            </label>
            <label class="check-row">
              <input id="mirrorX" type="checkbox" />
              <span>水平镜像</span>
            </label>
            <label class="check-row">
              <input id="mirrorY" type="checkbox" />
              <span>垂直镜像</span>
            </label>
            <label class="field">
              <span>采样方式</span>
              <select id="sampleMode">
                <option value="classic" selected>经典还原（原版效果）</option>
                <option value="dominant">主导色采样（卡通图）</option>
                <option value="enhanced">平衡还原</option>
                <option value="average">区域平均</option>
                <option value="center">中心取样</option>
              </select>
            </label>
            <div class="config-group">
              <div class="section-title compact">配色方案</div>
              <button class="scheme-button active" type="button">默认</button>
            </div>
            <div class="config-group">
              <div class="section-title compact">颜色套餐（颜色上限）</div>
              <div class="package-options" id="packageOptions" role="radiogroup">
                <button class="package-option active" type="button" data-package="221">
                  A-M 全色号 (最多 221)
                </button>
                <button class="package-option" type="button" data-package="72">最多 72 色</button>
                <button class="package-option" type="button" data-package="48">最多 48 色</button>
                <button class="package-option" type="button" data-package="24">最多 24 色</button>
                <button class="package-option" type="button" data-package="12">最多 12 色</button>
                <button class="package-option" type="button" data-package="8">最多 8 色</button>
                <button class="package-option" type="button" data-package="6">最多 6 色</button>
              </div>
            </div>
            <div class="required-colors">
              <div class="required-title" id="requiredTitle">暂无所需颜色</div>
              <div class="required-list" id="requiredList"></div>
            </div>
          </section>

          <section class="panel-section">
            <div class="section-title">显示</div>
            <label class="check-row">
              <input id="showGrid" type="checkbox" checked />
              <span>网格线</span>
            </label>
            <label class="check-row">
              <input id="showCodes" type="checkbox" />
              <span>显示色号</span>
            </label>
          </section>

          <section class="panel-section">
            <div class="section-title">手动改色</div>
            <label class="check-row">
              <input id="manualEditMode" type="checkbox" disabled />
              <span>启用画布改色</span>
            </label>
            <label class="field">
              <span>画笔色号</span>
              <select id="paintColorSelect" disabled></select>
            </label>
            <div class="paint-toolbar">
              <button class="button" id="eyedropperMode" type="button" disabled>吸管</button>
              <button class="button" id="undoPaint" type="button" disabled>撤销</button>
            </div>
            <div class="paint-status" id="paintStatus">生成图纸后可手动改色</div>
          </section>

          <section class="panel-section">
            <div class="section-title">导出</div>
            <div class="button-grid">
              <button class="button primary" id="exportPng" type="button" disabled>PNG</button>
              <button class="button" id="exportCsv" type="button" disabled>CSV</button>
              <button class="button" id="exportJson" type="button" disabled>JSON</button>
            </div>
          </section>
        </aside>

        <section class="result-panel" aria-label="解析结果">
          <div class="result-toolbar">
            <div>
              <p class="eyebrow">Pattern Preview</p>
              <h2 id="resultTitle">上传图片后生成图纸</h2>
              <div class="preview-zoom" aria-label="图例缩放">
                <span>图例缩放</span>
                <button id="zoomOut" type="button" title="缩小图例" aria-label="缩小图例">−</button>
                <input
                  id="cellSize"
                  type="range"
                  min="6"
                  max="30"
                  value="18"
                  aria-label="图例缩放"
                />
                <button id="zoomIn" type="button" title="放大图例" aria-label="放大图例">+</button>
                <output id="zoomValue" for="cellSize">100%</output>
              </div>
            </div>
            <div class="summary-strip" id="summaryStrip">
              <span>0 色</span>
              <span>0 颗</span>
            </div>
          </div>

          <div class="canvas-stage" id="canvasStage">
            <canvas id="patternCanvas" width="720" height="540"></canvas>
            <div class="empty-state" id="emptyState">
              <strong>等待图片</strong>
              <span>图纸会显示在这里</span>
            </div>
          </div>

          <div class="palette-panel">
            <div class="palette-header">
              <h2>用色清单</h2>
              <span id="paletteMeta">暂无数据</span>
            </div>
            <div class="palette-list" id="paletteList"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-backdrop image-editor-modal" id="imageEditorModal" hidden>
      <section class="image-editor-dialog" role="dialog" aria-modal="true" aria-labelledby="imageEditorTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Image Editor</p>
            <h2 id="imageEditorTitle">编辑上传图片</h2>
          </div>
          <button class="icon-button" id="closeImageEditor" type="button" aria-label="取消编辑" title="取消编辑">×</button>
        </header>
        <div class="image-editor-workspace">
          <div class="image-editor-canvas-wrap">
            <canvas id="imageEditorCanvas" width="960" height="620"></canvas>
            <span class="editor-hint">拖动框选区域，框外可平移图片</span>
          </div>
          <aside class="image-editor-controls" aria-label="图片编辑工具">
            <div class="editor-tool-grid">
              <button class="tool-button" id="rotateImage" type="button">↻<span>旋转</span></button>
              <button class="tool-button" id="flipImageX" type="button">↔<span>水平翻转</span></button>
              <button class="tool-button" id="flipImageY" type="button">↕<span>垂直翻转</span></button>
              <button class="tool-button" id="resetImageEditor" type="button">↺<span>重置</span></button>
            </div>
            <label class="editor-range">
              <span>图片缩放</span>
              <input id="imageEditorZoom" type="range" min="50" max="240" value="100" />
            </label>
            <button class="button background-button" id="removeImageBackground" type="button">
              一键去除背景
            </button>
            <span class="editor-status" id="imageEditorStatus">保留主体颜色，去除与边缘连通的背景</span>
          </aside>
        </div>
        <footer class="modal-footer">
          <button class="button" id="cancelImageEditor" type="button">取消</button>
          <button class="button primary" id="applyImageEditor" type="button">使用处理后的图片</button>
        </footer>
      </section>
    </div>

    <div class="modal-backdrop export-preview-modal" id="exportPreviewModal" hidden>
      <section class="export-preview-dialog" role="dialog" aria-modal="true" aria-labelledby="exportPreviewTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Export Preview</p>
            <h2 id="exportPreviewTitle">下载前预览</h2>
          </div>
          <button class="icon-button" id="closeExportPreview" type="button" aria-label="关闭预览" title="关闭预览">×</button>
        </header>
        <div class="export-preview-stage">
          <img id="exportPreviewImage" alt="导出图纸预览" />
        </div>
        <footer class="modal-footer">
          <button class="button" id="cancelExportPreview" type="button">返回修改</button>
          <button class="button primary" id="confirmExportPng" type="button">确认下载 PNG</button>
        </footer>
      </section>
    </div>

    <script src="./assets/mard-palette.js?v=mard-15" defer></script>
    <script src="./assets/app.js?v=mard-15" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
